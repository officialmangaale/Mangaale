server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # APK Downloads Configuration
  location /downloads/ {
    alias /usr/share/nginx/html/downloads/;
    
    # Set correct MIME type for APK files
    types {
      application/vnd.android.package-archive apk;
    }
    
    # Force download with attachment
    add_header Content-Disposition "attachment; filename=$request_filename";
    
    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    
    # Cache control - APK files can be cached but validate periodically
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, must-revalidate";
    
    # Enable gzip compression for APKs
    gzip on;
    gzip_types application/vnd.android.package-archive;
    gzip_min_length 1000;
    
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
